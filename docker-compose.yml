services:
  mongodb:
    image: mongo:7
    container_name: intranet-KB
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: paricus_kb
    volumes:
      - paricus_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  paricus_mongo_data:
    name: paricus_mongo_data
